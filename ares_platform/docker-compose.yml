version: '3.8'

services:
  ares-app:
    build: .
    container_name: ares_platform
    ports:
      - "8501:8501"
    volumes:
      - ares_data:/app/data
    environment:
      # You MUST provide your OpenAI API Key when running the container
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

volumes:
  ares_data:
