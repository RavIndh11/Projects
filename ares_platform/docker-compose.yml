services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ares_postgres
    environment:
      POSTGRES_USER: ares_user
      POSTGRES_PASSWORD: ares_password
      POSTGRES_DB: ares_db
    ports:
      - "5432:5432"
    volumes:
      - ares_db_data:/var/lib/postgresql/data
    restart: always

volumes:
  ares_db_data:
